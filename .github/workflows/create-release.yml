name: Create Release

on:
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:

jobs:
  build-release-artifacts:
    # Publish only from main. Automatic runs are limited to release bump commits;
    # workflow_dispatch is kept as an explicit recovery path for release automation.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'bump: version v'))
    environment: publish
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-data.outputs.version }}
      prerelease_flag: ${{ steps.check-prerelease.outputs.prerelease_flag }}
    steps:
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}

      - uses: ./.github/workflows/actions/install_dependencies

      - name: export release-data
        id: release-data
        run: |
          export RELEASE="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=${RELEASE}" >> $GITHUB_OUTPUT

      - name: Check release tag does not exist
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.release-data.outputs.version }}" >/dev/null; then
            echo "Release tag ${{ steps.release-data.outputs.version }} already exists."
            exit 1
          fi

      - name: Check Version
        id: check-prerelease
        run: |
          [[ "$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || echo prerelease_flag="--prerelease" >> $GITHUB_OUTPUT

      - name: Build
        run: uv build

      - name: Tag "${{ steps.release-data.outputs.version }}" & Push
        run: |
          git tag ${{ steps.release-data.outputs.version }}
          git push origin ${{ steps.release-data.outputs.version }}

      - name: Create Release
        run: gh release create ${{ steps.release-data.outputs.version }} --generate-notes ${{ steps.check-prerelease.outputs.prerelease_flag }}
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}

      - name: Upload artifacts
        run: gh release upload ${{ steps.release-data.outputs.version }} dist/*
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}

      - name: Upload distributions for publishing
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  publish-to-pypi:
    needs: build-release-artifacts
    environment: publish
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/workflows/actions/install_dependencies

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish
        run: uv publish --trusted-publishing automatic dist/*
