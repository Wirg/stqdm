default_stages: [ pre-commit ]
repos:
  -   repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
        - id: trailing-whitespace
        - id: end-of-file-fixer
        - id: check-yaml
        - id: check-json
        - id: check-toml
  - repo: local
    hooks:
      - id: black
        name: Formatting (black)
        entry: uv run black
        language: system
        types: [ python ]
        stages: [ pre-commit ]
      - id: lint
        name: Linter (pylint)
        entry: uv run pylint
        language: system
        types: [ python ]
        stages: [ pre-commit ]
      - id: isort
        name: Ordering imports (isort)
        entry: uv run isort
        language: system
        types: [ python ]
        stages: [ pre-commit ]
      - id: test
        name: Unit tests (pytest)
        entry: uv run pytest
        pass_filenames: false
        language: system
        types: [ python ]
        stages: [ pre-push ]
